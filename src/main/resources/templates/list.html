<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${viewType} + ' - FindIt'">List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css(v=4)}">
</head>
<body>

    <nav class="navbar animate-drop-down">
        <a href="/" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            FindIt
        </a>
        
        <form action="/" method="GET" style="display: flex; gap: 0.5rem; flex: 1; max-width: 500px; margin: 0 2rem;">
            <select name="filter" class="form-control" style="width: auto; padding: 0.5rem; background: rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.2); backdrop-filter: blur(10px);">
                <option value="ALL" th:selected="${currentFilter == 'ALL'}" style="color: black;">All Items</option>
                <option value="LOST" th:selected="${currentFilter == 'LOST'}" style="color: black;">Lost</option>
                <option value="FOUND" th:selected="${currentFilter == 'FOUND'}" style="color: black;">Found</option>
            </select>
            <input type="text" name="q" th:value="${searchQuery}" placeholder="Search items..." class="form-control" style="padding: 0.5rem 1rem; border-color: rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);">
            <button type="submit" class="btn-primary" style="padding: 0.5rem 1rem;">Search</button>
        </form>

        <div class="nav-links">
            <a href="/lost" th:style="${viewType == 'Lost Items' ? 'color: var(--text-main); font-weight: 700;' : ''}">Lost Items</a>
            <a href="/found" th:style="${viewType == 'Found Items' ? 'color: var(--text-main); font-weight: 700;' : ''}">Found Items</a>
            <a href="/report" class="btn-primary">+ Report Item</a>
            <!-- Auth Section -->
            <a th:if="${currentUser == null}" href="/login" class="btn-secondary" style="border: 1px solid rgba(255,255,255,0.2);">Login</a>
            <div th:if="${currentUser != null}" style="display: flex; align-items: center; gap: 1rem; margin-left: 0.5rem; padding-left: 1rem; border-left: 1px solid rgba(255,255,255,0.2);">
                <span style="color: var(--text-main); font-weight: 600;" th:text="${currentUser}"></span>
                <a href="/my-items" style="color: var(--text-muted); font-size: 0.9rem; text-decoration: underline;">My Dashboard</a>
                <a href="/logout" style="color: var(--text-muted); font-size: 0.9rem;">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container animate-fade-in">
        <h1 style="margin-bottom: 3rem; font-size: 3.5rem; font-weight: 800; letter-spacing: -1px; text-align: center; text-shadow: 0 5px 20px rgba(0,0,0,0.8);" th:text="${viewType}"></h1>
        
        <div class="grid">
            <div th:each="item : ${items}" class="card-3d-wrapper">
                <div class="card-3d" style="display:flex; flex-direction:column; height: 100%;">
                    <div class="card-content-3d" style="display:flex; flex-direction:column; height: 100%;">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1.5rem;">
                            <div>
                                <span th:class="${item.type.name() == 'LOST' ? 'badge badge-lost' : 'badge badge-found'}" 
                                      th:text="${item.type}">TYPE</span>
                                <span th:if="${item.itemStatus != 'OPEN'}" class="badge" style="background: var(--bg-hover); margin-left: 0.5rem;" th:text="${item.itemStatus}"></span>
                            </div>
                            <small style="color: var(--text-muted); font-weight: 500;" th:text="${item.dateLostOrFound}"></small>
                        </div>
                        <h3 th:text="${item.title}" style="margin-bottom: 1rem; font-size: 1.5rem; letter-spacing: -0.5px;"></h3>
                        <p style="color: var(--text-muted); margin-bottom: 2rem; flex: 1; line-height: 1.6;" th:text="${item.description}"></p>
                        
                        <div style="margin-top:auto; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.05);">
                            <p style="font-size: 0.9rem; margin-bottom: 0.5rem; color: var(--text-muted);">
                                <strong style="color: var(--text-main);">Location:</strong> <span th:text="${item.location}"></span>
                            </p>
                            <p style="font-size: 0.9rem; color: var(--text-muted);">
                                <strong style="color: var(--text-main);">Contact:</strong> <span th:text="${item.contactName}"></span> 
                                <span style="opacity:0.5; margin: 0 0.5rem;">|</span> 
                                <a th:href="'mailto:' + ${item.contactEmail}" style="color: var(--primary); text-decoration: none;" th:text="${item.contactEmail}"></a>
                            </p>
                            <div th:if="${item.type.name() == 'FOUND' and item.itemStatus == 'OPEN'}" style="margin-top: 1rem;">
                                <a th:href="@{'/claim/' + ${item.id}}" class="btn-secondary" style="display: block; text-align: center; border: 1px solid rgba(255,255,255,0.2);">Claim Item</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div th:if="${#lists.isEmpty(items)}" class="card-3d-wrapper" style="grid-column: 1 / -1;">
                <div class="card-3d" style="text-align:center; padding: 5rem;">
                    <div class="card-content-3d">
                        <h3 style="color: var(--text-muted); font-weight: 400;">No items found in this category.</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3D Card Script -->
    <script>
        document.querySelectorAll('.card-3d').forEach(card => {
            const wrapper = card.parentElement;
            
            wrapper.addEventListener('mousemove', e => {
                const rect = wrapper.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const rotateX = ((y - centerY) / centerY) * -10;
                const rotateY = ((x - centerX) / centerX) * 10;
                
                card.classList.remove('resetting');
                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });
            
            wrapper.addEventListener('mouseleave', () => {
                card.classList.add('resetting');
                card.style.transform = `rotateX(0deg) rotateY(0deg)`;
            });
        });
    </script>
</body>
</html>
